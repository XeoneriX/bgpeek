name: Release

on:
  push:
    tags: ['v*']

jobs:
  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need full history + tags for `git describe`
      - name: Build release notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"

          # Extract this version's section from CHANGELOG.md (between "## [VERSION]" and the next "## [").
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > notes.md

          # Fallback if no matching section was found.
          if [ ! -s notes.md ]; then
            echo "See [CHANGELOG](https://github.com/${GITHUB_REPOSITORY}/blob/${TAG}/CHANGELOG.md) for details." > notes.md
            echo "" >> notes.md
          fi

          {
            echo ""
            echo "## Install"
            echo ""
            echo "_Coming soon — GHCR and PyPI publishing will be enabled in a future release._"
          } >> notes.md

          if [ -n "$PREV_TAG" ]; then
            {
              echo ""
              echo "**Full Changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${TAG}"
            } >> notes.md
          fi
      - uses: softprops/action-gh-release@v3
        with:
          body_path: notes.md
          generate_release_notes: false

