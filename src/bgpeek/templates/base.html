<!DOCTYPE html>
<html lang="{{ lang | default('en') }}" data-theme-storage-key="{{ brand.theme_storage_key }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ brand.site_name }}{% endblock %}</title>
    <link rel="icon" href="{{ brand.favicon_path }}">
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <script src="/static/js/htmx.min.js"></script>
    <script>
      /* Apply dark mode before paint to prevent flash. */
      (function () {
        var k = document.documentElement.getAttribute("data-theme-storage-key") || "bgpeek-theme";
        var s = localStorage.getItem(k);
        if (s === "dark" || (!s && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      /* Minimal custom styles — scrollbar and htmx indicator. */
      .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
      .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
      .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
      .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
      .scrollbar-thin::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
      /* Community label colors: light value by default, dark under .dark */
      .cl { color: var(--cl); }
      .dark .cl { color: var(--cd); }
      {% if brand.custom_css %}
      {{ brand.custom_css | safe }}
      {% endif %}
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    {% block body %}{% endblock %}
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/clipboard.js"></script>
    <script src="/static/js/diff.js"></script>
</body>
</html>
